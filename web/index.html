<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>AIChatMatrix</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="/static/app.css?v=6"></head><body><div class="video-backdrop" id="video-backdrop"><video id="backdrop-video" src="" playsinline muted></video></div><div class="topbar"><div class="topbar-logo">&#x276A; AIChatMatrix &#x276B;</div><div class="topbar-sep"></div><button class="tab-btn active" id="tab-chat" onclick="showPage('chat')">聊天室</button><button class="tab-btn" id="tab-personas" onclick="showPage('personas')">AI 角色库</button><button class="tab-btn" id="tab-templates" onclick="showPage('templates')">房间模板</button><button class="tab-btn" id="tab-providers" onclick="showPage('providers')">模型配置</button></div><div class="layout"><div class="sidebar"><div class="sidebar-header"><span class="sidebar-title">房间列表</span><button class="icon-btn" onclick="openCreateRoom()">+</button></div><div class="room-list" id="room-list"></div></div><div class="main"><div class="page active" id="page-chat"><div id="no-room-view" class="no-room"><div class="no-room-icon">&#x1F916;</div><div class="no-room-text">选择或创建一个聊天房间</div><button class="btn btn-primary" onclick="openCreateRoom()">+ 新建房间</button></div><div id="room-view" style="display:none;flex:1;flex-direction:column;overflow:hidden"><div class="chat-header"><div class="chat-header-info"><div class="chat-title" id="room-title"></div><div class="chat-topic" id="room-topic-display"></div></div><div class="chat-controls"><button class="btn btn-ghost btn-sm" onclick="openEditRoom()">编辑</button><button class="btn btn-ghost btn-sm" id="btn-ws-debug" onclick="toggleWSDebugFromUI()">WS调试:关</button><button class="btn btn-primary btn-sm" id="btn-start" onclick="startRoom()">&#x25B6; 启动</button><button class="btn btn-danger btn-sm" id="btn-stop" onclick="stopRoom()" style="display:none">&#x25FC; 停止</button><button class="btn btn-ghost btn-sm" id="btn-restart" onclick="restartRoom()" style="display:none">&#x21BA; 重开</button><button class="btn btn-ghost btn-sm" onclick="openAddAgent()">+ 添加 AI</button><button class="btn btn-danger btn-sm" onclick="deleteRoom()">&#x1F5D1;</button></div></div><div class="chat-view"><div class="chat-main"><div class="messages-wrap" id="messages"></div><div id="typing-indicator" class="typing-indicator" style="display:none"><div class="typing-dots"><span></span><span></span><span></span></div><span class="typing-agent-name">AI 正在思考...</span></div><div class="syscmd-panel"><div class="syscmd-header" onclick="toggleSysCmd()"><span>&#x26A1;</span><span class="syscmd-title">系统指令</span><span class="syscmd-toggle" id="syscmd-toggle-icon">&#x25BC;</span></div><div class="syscmd-body" id="syscmd-body"><div class="syscmd-row"><textarea class="syscmd-textarea" id="syscmd-text" placeholder="输入系统指令..."></textarea><div style="display:flex;flex-direction:column;gap:4px;align-self:flex-end"><button class="btn btn-yellow btn-sm" onclick="sendSysCmd()">发送</button><button class="syscmd-stop-btn" onclick="sendSysCmd(true)">停止</button></div></div></div></div></div><div class="agents-panel" id="agents-panel"><div class="agents-resizer" id="agents-resizer"></div><div class="agents-panel-header"><span class="agents-panel-title">AI 成员</span><button class="icon-btn" style="color:var(--accent3);font-size:13px" onclick="openRefereeModal()" title="设置裁判">&#x2696;</button></div><div class="agents-list" id="agents-list"></div></div></div></div></div><div class="page" id="page-personas"><div class="personas-layout"><div class="personas-sidebar" id="personas-sidebar"><div class="personas-resizer" id="personas-resizer"></div><div class="personas-sidebar-header"><span class="sidebar-title">文件夹</span><button class="icon-btn" onclick="openCreateFolder()">+</button></div><div class="folder-list" id="folder-list"></div></div><div class="personas-main"><div class="personas-header"><span class="section-title" id="personas-section-title">AI 角色库</span><button class="btn btn-primary" onclick="openCreatePersona()">+ 新建角色</button></div><div class="personas-grid" id="personas-grid"></div></div></div></div><div class="page" id="page-templates"><div class="page-content"><div class="section-header"><span class="section-title">房间模板</span><button class="btn btn-primary" onclick="openCreateTemplate()">+ 新建模板</button></div><div class="cards-grid" id="templates-grid"></div></div></div><div class="page" id="page-providers"><div class="page-content"><div class="section-header"><span class="section-title">模型提供商</span><button class="btn btn-primary" onclick="openAddProvider()">+ 添加提供商</button></div><div class="cards-grid" id="providers-grid"></div></div></div></div></div><div class="statusbar"><div class="status-item"><div class="status-dot ok"></div> 运行中</div><div class="status-item" id="status-ws">WS: 未连接</div><div class="status-item" id="status-msg-count"></div></div>
<div class="modal-overlay" id="modal-template"><div class="modal"><div class="modal-title" id="modal-template-title">新建模板</div><div class="form-group"><label class="form-label">模板名称</label><input class="form-input" id="tpl-name"/></div><div class="form-group"><label class="form-label">描述</label><input class="form-input" id="tpl-desc"/></div><div class="form-group"><label class="form-label">默认话题</label><input class="form-input" id="tpl-topic"/></div><div class="form-group"><label class="form-label">规则/提示词</label><textarea class="form-textarea" id="tpl-rules"></textarea></div><div class="form-group"><label class="form-label">最大消息数</label><input class="form-input" id="tpl-maxmsg" type="number" value="0"/></div><div class="form-group"><label class="form-label">停止条件</label><input class="form-input" id="tpl-stop-condition"/></div><div class="form-group"><label class="form-label">标签</label><input class="form-input" id="tpl-tags" placeholder="debate,tech"/></div><input type="hidden" id="tpl-id"/><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-template')">取消</button><button class="btn btn-primary" onclick="saveTemplate()">保存</button></div></div></div><div class="modal-overlay" id="modal-room"><div class="modal"><div class="modal-title" id="modal-room-title">新建房间</div><div class="form-group"><label class="form-label">使用模板（可选）</label><select class="form-select" id="room-template-select" onchange="applyRoomTemplate(this.value)"><option value="">-- 不使用 --</option></select></div><div class="form-group"><label class="form-label">房间名称</label><input class="form-input" id="room-name"/></div><div class="form-group"><label class="form-label">话题</label><input class="form-input" id="room-topic"/></div><div class="form-group"><label class="form-label">规则/提示词</label><textarea class="form-textarea" id="room-rules"></textarea></div><div class="form-group"><label class="form-label">最大消息数</label><input class="form-input" id="room-maxmsg" type="number" value="0"/></div><div class="form-group"><label class="form-label">停止条件</label><input class="form-input" id="room-stop-condition"/><div class="form-hint">当 AI 说出该关键词时停止</div></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-room')">取消</button><button class="btn btn-primary" onclick="saveRoom()">保存</button></div></div></div><div class="modal-overlay" id="modal-agent"><div class="modal"><div class="modal-title">添加 AI 角色</div><div class="form-group"><label class="form-label">预设文件夹</label><select class="form-select" id="agent-persona-folder" onchange="onAgentPersonaFolderChange(this.value)"><option value="">-- 全部文件夹 --</option></select></div><div class="form-group"><label class="form-label">预设角色</label><select class="form-select" id="agent-persona-select" onchange="onPersonaSelect(this.value)"><option value="">-- 自定义 --</option></select></div><div class="form-group"><label class="form-label">名称</label><input class="form-input" id="agent-name"/></div><div class="form-group"><label class="form-label">模型提供商</label><select class="form-select" id="agent-provider"></select></div><div class="form-group"><label class="form-label">性格/系统提示</label><textarea class="form-textarea" id="agent-personality"></textarea></div><div class="form-group" style="flex-direction:row;align-items:center;gap:8px"><input type="checkbox" id="agent-is-assistant" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent3)"/><label class="form-label" style="margin:0;cursor:pointer;color:var(--accent3)" for="agent-is-assistant">作为裁判辅助角色</label></div><div class="form-row"><div class="form-group"><label class="form-label">头像颜色</label><input class="form-input" id="agent-color" type="color" value="#00d4ff" style="height:38px;padding:3px"/></div><div class="form-group"><label class="form-label">头像图片</label><input type="file" id="agent-avatar-file" accept="image/*" style="display:none" onchange="previewAgentAvatar(this)"/><button class="btn btn-ghost btn-sm" onclick="document.getElementById('agent-avatar-file').click()">上传图片</button></div></div><img id="agent-avatar-preview" style="display:none;width:50px;height:50px;border-radius:50%;object-fit:cover"/><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-agent')">取消</button><button class="btn btn-primary" onclick="saveAgent()">添加</button></div></div></div><div class="modal-overlay" id="modal-observer"><div class="modal"><div class="modal-title">添加旁观者</div><div class="form-group"><label class="form-label">名称</label><input class="form-input" id="observer-name"/></div><div class="form-group"><label class="form-label">模型提供商</label><select class="form-select" id="observer-provider"></select></div><div class="form-group"><label class="form-label">观察风格</label><textarea class="form-textarea" id="observer-personality"></textarea></div><div class="form-group"><label class="form-label">头像颜色</label><input class="form-input" id="observer-color" type="color" value="#7c3aed" style="height:38px;padding:3px"/></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-observer')">取消</button><button class="btn btn-primary" onclick="saveObserver()">添加</button></div></div></div><div class="modal-overlay" id="modal-referee"><div class="modal"><div class="modal-title" id="modal-referee-title">设置裁判</div><div class="form-group"><label class="form-label">预设裁判角色</label><select class="form-select" id="referee-persona-select" onchange="onRefereePersonaSelect(this.value)"><option value="">-- 自定义 --</option></select></div><div class="form-group"><label class="form-label">名称</label><input class="form-input" id="referee-name"/></div><div class="form-group"><label class="form-label">模型提供商</label><select class="form-select" id="referee-provider"></select></div><div class="form-group"><label class="form-label">性格/系统提示</label><textarea class="form-textarea" id="referee-personality"></textarea></div><div class="form-group"><label class="form-label">头像颜色</label><input class="form-input" id="referee-color" type="color" value="#7c3aed" style="height:38px;padding:3px"/></div><input type="hidden" id="referee-id"/><div class="modal-actions"><button class="btn btn-danger" id="referee-remove-btn" style="margin-right:auto;display:none" onclick="removeReferee()">移除</button><button class="btn btn-ghost" onclick="closeModal('modal-referee')">取消</button><button class="btn btn-primary" onclick="saveReferee()">保存</button></div></div></div><div class="modal-overlay" id="modal-provider"><div class="modal"><div class="modal-title" id="modal-provider-title">添加提供商</div><div class="form-group"><label class="form-label">名称</label><input class="form-input" id="prov-name"/></div><div class="form-group"><label class="form-label">Base URL</label><input class="form-input" id="prov-url"/><div class="form-hint">兼容 OpenAI API 格式</div></div><div class="form-group"><label class="form-label">API Key</label><input class="form-input" id="prov-key" type="password"/></div><div class="form-group"><label class="form-label">Model</label><input class="form-input" id="prov-model"/></div><div class="form-group"><label class="form-label">Max Tokens</label><input class="form-input" id="prov-tokens" type="number" value="500"/></div><input type="hidden" id="prov-id"/><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-provider')">取消</button><button class="btn btn-primary" onclick="saveProvider()">保存</button></div></div></div><div class="modal-overlay" id="modal-persona"><div class="modal"><div class="modal-title" id="modal-persona-title">新建角色</div><div class="form-group"><label class="form-label">名称</label><input class="form-input" id="persona-name"/></div><div class="form-group"><label class="form-label">性格/系统提示</label><textarea class="form-textarea" id="persona-personality"></textarea></div><div class="form-group"><label class="form-label">文件夹</label><select class="form-select" id="persona-folder"><option value="">无文件夹</option></select></div><div class="form-group"><label class="form-label">标签</label><input class="form-input" id="persona-tags" placeholder="tech,analysis"/></div><div class="form-row"><div class="form-group"><label class="form-label">头像颜色</label><input class="form-input" id="persona-color" type="color" value="#00d4ff" style="height:38px;padding:3px"/></div><div class="form-group"><label class="form-label">头像图片</label><input type="file" id="persona-avatar-file" accept="image/*" style="display:none" onchange="previewPersonaAvatar(this)"/><button class="btn btn-ghost btn-sm" onclick="document.getElementById('persona-avatar-file').click()">上传图片</button><img id="persona-avatar-preview" style="display:none;width:40px;height:40px;border-radius:50%;object-fit:cover"/></div></div><div class="form-group"><label class="form-label">出场视频</label><input type="file" id="persona-video-file" accept="video/*" style="display:none" onchange="previewPersonaVideo(this)"/><button class="btn btn-ghost btn-sm" onclick="document.getElementById('persona-video-file').click()">上传图片</button><span id="persona-video-name" style="font-size:11px;color:var(--text-muted);margin-left:8px"></span></div><div class="form-group" style="flex-direction:row;align-items:center;gap:8px"><input type="checkbox" id="persona-is-referee" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent3)"/><label class="form-label" style="margin:0;cursor:pointer;color:var(--accent3)" for="persona-is-referee">标记为裁判角色</label></div><input type="hidden" id="persona-id"/><input type="hidden" id="persona-avatar-data"/><input type="hidden" id="persona-video-data"/><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-persona')">取消</button><button class="btn btn-primary" onclick="savePersona()">保存</button></div></div></div><div class="modal-overlay" id="modal-confirm"><div class="modal" style="width:360px;gap:20px"><div class="modal-title">确认操作</div><p id="confirm-msg" style="font-size:14px;color:var(--text)"></p><div class="modal-actions"><button class="btn btn-ghost" onclick="document.getElementById('modal-confirm').classList.remove('open')">取消</button><button class="btn btn-danger" id="confirm-ok-btn">确定</button></div></div></div><div class="modal-overlay" id="modal-test"><div class="modal" style="width:640px;max-width:96vw"><div style="display:flex;align-items:center;justify-content:space-between"><div class="modal-title">模型测试 — <span id="test-provider-name" style="color:var(--accent);font-size:14px"></span></div><button class="btn btn-ghost btn-sm" onclick="closeModal('modal-test')">关闭</button></div><div id="test-log" class="test-log"></div></div></div>
<div id="agent-context-menu" style="position:absolute;z-index:3000;display:none;background:var(--bg-panel);border:1px solid var(--border);padding:8px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12)"><div style="display:flex;flex-direction:column;gap:6px"><button class="btn btn-ghost btn-sm" onclick="contextEditAgent()">调整角色</button><button class="btn btn-ghost btn-sm" id="ctx-referee-manage" onclick="contextManageReferee()" style="display:none">管理裁判</button></div></div><button id="observer-fab" class="observer-fab" style="display:none" title="旁观者对话（双击打开）" onmousedown="startObserverFabDrag(event)" ondblclick="dblclickObserverFab(event)" onclick="clickObserverFab()">🧚</button><div id="observer-chat-float" class="observer-chat-float" style="display:none"><div class="observer-chat-header"><div><div class="observer-chat-title">🛰 旁观者私聊</div><div class="observer-chat-subtitle">仅你可见 · 不会发送到公屏</div></div><button class="btn btn-ghost btn-sm" onclick="closeObserverChatWindow()">关闭</button></div><div id="observer-chat-log" class="observer-chat-log"></div><div class="observer-chat-input-row"><textarea id="observer-chat-input" class="syscmd-textarea" placeholder="输入你的问题，回车发送"></textarea><button class="btn btn-yellow btn-sm" onclick="sendObserverChat()">发送</button></div></div><script src="/static/app.js?v=6"></script>
</body></html>
